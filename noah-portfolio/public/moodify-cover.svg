<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Moodify — album art palettes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26232c"/>
      <stop offset="1" stop-color="#4b3f6b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g transform="translate(140 200)">
    <circle r="86" fill="#171420"/>
    <circle r="84" fill="none" stroke="#c9b3ec" stroke-opacity="0.35" stroke-width="2"/>
    <circle r="58" fill="none" stroke="#c9b3ec" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle r="34" fill="none" stroke="#c9b3ec" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle r="14" fill="#7fe0bd"/>
    <circle r="5" fill="#171420"/>
  </g>
  <g transform="translate(300 128)">
    <circle cx="0" cy="0" r="22" fill="#f3d9c8"/>
    <circle cx="58" cy="0" r="22" fill="#e88d67"/>
    <circle cx="116" cy="0" r="22" fill="#7a5fa0"/>
    <circle cx="174" cy="0" r="22" fill="#7fe0bd"/>
  </g>
  <g fill="#eae6f2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
